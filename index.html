<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Habits</title>
<meta name="theme-color" content="#0B0B0E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="css/glass-tokens.css">
</head>
<body>
<div class="app" style="max-width:460px; margin:0 auto; position:relative; min-height:100dvh;">

  <section id="page-dashboard" class="page safe-bottom" style="padding:calc(28px + env(safe-area-inset-top)) 16px 0;"></section>
  <section id="page-habits" class="page safe-bottom" style="padding:calc(28px + env(safe-area-inset-top)) 16px 0;">
    <header style="margin-bottom:18px;">
      <p class="eyebrow" id="habits-date"></p>
      <h1 class="title-lg">Habits</h1>
    </header>
    <div id="habits-list"></div>
    <button id="fab-add" style="position:fixed; left:50%; transform:translateX(-50%); bottom:calc(96px + env(safe-area-inset-bottom)); width:56px; height:56px; border-radius:50%; border:none; cursor:pointer; z-index:41;
      background:var(--grad-primary); box-shadow:0 10px 30px rgba(124,58,237,0.55); color:#fff; font:700 24px sans-serif;">+</button>
  </section>
  <section id="page-stats" class="page safe-bottom" style="padding:calc(28px + env(safe-area-inset-top)) 16px 0;">
    <header style="margin-bottom:18px;"><h1 class="title-lg">Stats</h1></header>
    <div id="stats-body"></div>
  </section>
  <section id="page-settings" class="page safe-bottom" style="padding:calc(28px + env(safe-area-inset-top)) 16px 0;">
    <header style="margin-bottom:18px;"><h1 class="title-lg">Settings</h1></header>
    <div id="settings-body"></div>
  </section>

  <nav class="tabbar glass" style="position:fixed; left:16px; right:16px; bottom:calc(16px + env(safe-area-inset-bottom)); max-width:428px; margin:0 auto; padding:10px 8px; z-index:40;">
    <div style="max-width:410px; margin:0 auto; display:flex;">
      <button data-tab="dashboard" style="flex:1; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 0; color:#8f86a3; font:500 10px sans-serif;">Dashboard</button>
      <button data-tab="habits" style="flex:1; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 0; color:#8f86a3; font:500 10px sans-serif;">Habits</button>
      <button data-tab="stats" style="flex:1; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 0; color:#8f86a3; font:500 10px sans-serif;">Stats</button>
      <button data-tab="settings" style="flex:1; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 0; color:#8f86a3; font:500 10px sans-serif;">Settings</button>
    </div>
  </nav>

  <div id="habit-modal" style="position:fixed; inset:0; z-index:100; background:linear-gradient(180deg,#17111f 0%,#050308 100%); overflow-y:auto; overscroll-behavior:contain;">
    <div id="modal-backdrop-close" style="position:absolute; inset:0; z-index:-1;"></div>
    <div id="habit-modal-inner"></div>
  </div>

</div>
<style>
  .page{ display:none; }
  .page.active{ display:block; }
  nav.tabbar button.active{ color:var(--violet-light); font-weight:700; }
  #habit-modal{ display:none; }
  #habit-modal.open{ display:block; }
</style>
<script>
  document.getElementById('habits-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase();
  document.querySelectorAll('nav.tabbar button')[0].classList.add('active');
</script>
<script type="module" src="js/app.js"></script>
</body>
</html>
