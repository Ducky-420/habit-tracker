<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Habits</title>
<meta name="theme-color" content="#0B0B0E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="css/glass-tokens.css">
</head>
<body>
<div class="app" style="max-width:460px; margin:0 auto; position:relative; height:100dvh;">

  <section id="page-dashboard" class="page">
    <header class="page-header" id="dashboard-header"></header>
    <div class="page-scroll" id="dashboard-scroll"></div>
  </section>
  <section id="page-habits" class="page">
    <header class="page-header">
      <p class="eyebrow" id="habits-date"></p>
      <h1 class="title-lg">Habits</h1>
    </header>
    <div class="page-scroll">
      <div id="habits-list"></div>
    </div>
    <button id="fab-add" style="position:fixed; left:50%; transform:translateX(-50%); bottom:calc(96px + env(safe-area-inset-bottom)); width:56px; height:56px; border-radius:50%; border:none; cursor:pointer; z-index:41;
      background:var(--grad-primary); box-shadow:0 10px 30px rgba(124,58,237,0.55); color:#fff; font:700 24px sans-serif;">+</button>
  </section>
  <section id="page-stats" class="page">
    <header class="page-header" style="display:flex; align-items:center; gap:10px;">
      <span class="icon-mask" style="width:24px; height:24px; color:var(--violet-light); -webkit-mask-image:url(https://unpkg.com/lucide-static@0.469.0/icons/chart-bar.svg); mask-image:url(https://unpkg.com/lucide-static@0.469.0/icons/chart-bar.svg);"></span>
      <h1 class="title-lg">Stats</h1>
    </header>
    <div class="page-scroll"><div id="stats-body"></div></div>
  </section>
  <section id="page-settings" class="page">
    <header class="page-header"><h1 class="title-lg">Settings</h1></header>
    <div class="page-scroll"><div id="settings-body"></div></div>
  </section>

  <nav class="tabbar" style="position:fixed; left:16px; right:16px; bottom:calc(16px + env(safe-area-inset-bottom)); max-width:428px; margin:0 auto; padding:10px 8px; z-index:40; border-radius:30px;
    backdrop-filter:blur(30px) saturate(190%); -webkit-backdrop-filter:blur(30px) saturate(190%);
    background:rgba(15,11,22,0.75); border:1px solid rgba(255,255,255,0.15);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.2), 0 20px 40px rgba(0,0,0,0.8);">
    <div style="max-width:320px; margin:0 auto; display:flex; gap:12px;">
      <button data-tab="dashboard" style="flex:1; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 0; font:500 10px sans-serif;">
        <span class="icon-mask" style="width:20px; height:20px; -webkit-mask-image:url(https://unpkg.com/lucide-static@0.469.0/icons/layout-grid.svg); mask-image:url(https://unpkg.com/lucide-static@0.469.0/icons/layout-grid.svg);"></span>
        Dashboard
      </button>
      <button data-tab="habits" style="flex:1; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 0; font:500 10px sans-serif;">
        <span class="icon-mask" style="width:20px; height:20px; -webkit-mask-image:url(https://unpkg.com/lucide-static@0.469.0/icons/list-checks.svg); mask-image:url(https://unpkg.com/lucide-static@0.469.0/icons/list-checks.svg);"></span>
        Habits
      </button>
      <button data-tab="stats" style="flex:1; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 0; font:500 10px sans-serif;">
        <span class="icon-mask" style="width:20px; height:20px; -webkit-mask-image:url(https://unpkg.com/lucide-static@0.469.0/icons/chart-bar.svg); mask-image:url(https://unpkg.com/lucide-static@0.469.0/icons/chart-bar.svg);"></span>
        Stats
      </button>
    </div>
  </nav>

  <div id="habit-modal" style="position:fixed; inset:0; z-index:100; background:linear-gradient(180deg,#17111f 0%,#050308 100%); overflow-y:auto; overscroll-behavior:contain;">
    <div id="modal-backdrop-close" class="backdrop" style="position:absolute; inset:0; z-index:-1;"></div>
    <div id="habit-modal-inner"></div>
  </div>

</div>
<script>
  document.getElementById('habits-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase();
  document.querySelectorAll('nav.tabbar button')[0].classList.add('active');
</script>
<script type="module" src="js/app.js"></script>
</body>
</html>
