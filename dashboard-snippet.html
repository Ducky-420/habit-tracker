<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
  * { box-sizing:border-box; }
  html, body {
    margin:0; height:100%; min-height:100dvh;
    overscroll-behavior:none;
    background:#0B0B0E;
  }
  html {
    background:
      radial-gradient(120% 70% at 50% -10%, rgba(139,92,246,0.30) 0%, rgba(139,92,246,0) 55%),
      radial-gradient(90% 60% at 90% 10%, rgba(168,85,247,0.18) 0%, rgba(168,85,247,0) 55%),
      linear-gradient(180deg, #0B0B0E 0%, #000000 100%);
    background-attachment:fixed;
  }
  body {
    min-height:100dvh;
    font-family:-apple-system,'SF Pro Rounded','Inter',system-ui,sans-serif;
  }
  .wrap {
    max-width:420px; margin:0 auto;
    padding:calc(32px + env(safe-area-inset-top)) 16px calc(130px + env(safe-area-inset-bottom));
  }

  .glass {
    position:relative;
    background:rgba(20,15,30,0.65);
    backdrop-filter:blur(40px) saturate(190%);
    -webkit-backdrop-filter:blur(40px) saturate(190%);
    border:1px solid rgba(255,255,255,0.16);
    border-top-color:rgba(255,255,255,0.3);
    box-shadow:
      inset 0 1px 1px rgba(255,255,255,0.35),
      inset 0 -1px 12px -6px rgba(139,92,246,0.4),
      0 20px 50px rgba(0,0,0,0.6),
      0 10px 25px rgba(139,92,246,0.15);
    border-radius:28px;
    overflow:hidden;
  }
  .glass::after {
    content:"";
    position:absolute; inset:0; border-radius:28px; pointer-events:none;
    background:linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0) 18%),
               linear-gradient(90deg, rgba(139,92,246,0.12) 0%, rgba(139,92,246,0) 12%, rgba(139,92,246,0) 88%, rgba(139,92,246,0.12) 100%);
  }

  .pill-btn {
    border:none; cursor:pointer; padding:12px 24px; border-radius:99px;
    background:linear-gradient(155deg, #a78bfa, #7c3aed);
    color:#fff; font:700 13.5px sans-serif;
    box-shadow:0 8px 22px rgba(124,58,237,0.45), inset 0 1px 1px rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
<div class="wrap">

  <header style="margin-bottom:22px; display:flex; align-items:center; gap:12px;">
    <svg viewBox="0 0 1024 1024" width="40" height="40" style="flex:none; border-radius:9px; box-shadow:0 2px 8px rgba(0,0,0,0.5);">
      <defs>
        <radialGradient id="ic-bg" cx="50%" cy="18%" r="90%">
          <stop offset="0%" stop-color="#231a35"/><stop offset="45%" stop-color="#0e0b16"/><stop offset="100%" stop-color="#000"/>
        </radialGradient>
        <linearGradient id="ic-spec" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#fff" stop-opacity="0.55"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="ic-ring" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#c4a4ff"/><stop offset="55%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#d946ef"/>
        </linearGradient>
        <clipPath id="ic-clip"><rect width="1024" height="1024" rx="224"/></clipPath>
      </defs>
      <g clip-path="url(#ic-clip)">
        <rect width="1024" height="1024" fill="url(#ic-bg)"/>
        <ellipse cx="512" cy="-60" rx="620" ry="380" fill="url(#ic-spec)"/>
        <circle cx="512" cy="540" r="220" fill="none" stroke="url(#ic-ring)" stroke-width="34" stroke-linecap="round" stroke-dasharray="1160 260"/>
        <path d="M420 545 L485 610 L620 465" fill="none" stroke="#fff" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </svg>
    <!-- Standalone 1024x1024 version for App Store export: app-icon.svg -->
    <div>
      <p style="font:500 11px/1 sans-serif; letter-spacing:.15em; text-transform:uppercase; color:#9c93b5; margin:0 0 6px;">Thursday, July 23</p>
      <h1 style="font:700 26px/1 sans-serif; color:#fff; letter-spacing:-0.01em; margin:0;">Dashboard</h1>
    </div>
  </header>

  <div class="glass" style="padding:20px; margin-bottom:14px;">
    <div style="display:flex; gap:10px; margin-bottom:18px;">
      <div style="flex:1;">
        <p style="font:700 26px sans-serif; color:#fff; margin:0; text-shadow:0 0 20px rgba(196,164,255,0.4);">78%</p>
        <p style="font:500 11px sans-serif; color:#9c93b5; margin:3px 0 0;">Completion today</p>
      </div>
      <div style="flex:1; border-left:1px solid rgba(255,255,255,0.14); padding-left:12px;">
        <p style="font:700 26px sans-serif; color:#c4a4ff; margin:0; text-shadow:0 0 20px rgba(196,164,255,0.55);">22</p>
        <p style="font:500 11px sans-serif; color:#9c93b5; margin:3px 0 0;">Best streak</p>
      </div>
    </div>
    <p style="font:500 11px sans-serif; letter-spacing:.08em; text-transform:uppercase; color:#9c93b5; margin:0 0 10px;">Last 7 days</p>
    <div style="display:flex; align-items:flex-end; gap:6px; height:46px;">
      <div style="flex:1; height:18px; border-radius:6px; background:rgba(196,164,255,.22);"></div>
      <div style="flex:1; height:26px; border-radius:6px; background:rgba(196,164,255,.22);"></div>
      <div style="flex:1; height:12px; border-radius:6px; background:rgba(196,164,255,.22);"></div>
      <div style="flex:1; height:34px; border-radius:6px; background:rgba(196,164,255,.22);"></div>
      <div style="flex:1; height:20px; border-radius:6px; background:rgba(196,164,255,.22);"></div>
      <div style="flex:1; height:30px; border-radius:6px; background:rgba(196,164,255,.22);"></div>
      <div style="flex:1; height:40px; border-radius:6px; background:linear-gradient(180deg,#c4a4ff,#8b5cf6); box-shadow:0 0 14px rgba(139,92,246,0.6);"></div>
    </div>
  </div>

  <div class="glass" style="padding:20px; text-align:center;">
    <p style="font:600 13px sans-serif; color:#d8d1ec; margin:0 0 14px;">Deep violet glass, refined border + specular rim</p>
    <button class="pill-btn">Add your first habit</button>
  </div>

</div>

<nav class="glass" style="position:fixed; left:16px; right:16px; bottom:calc(16px + env(safe-area-inset-bottom)); border-radius:30px; padding:12px 8px; max-width:420px; margin:0 auto;">
  <div style="max-width:390px; margin:0 auto; display:flex;">
    <button style="flex:1; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 0;">
      <div style="width:20px; height:20px; background:#c4a4ff; filter:drop-shadow(0 0 8px rgba(196,164,255,0.7)); -webkit-mask:url(https://unpkg.com/lucide-static@0.469.0/icons/house.svg) center/contain no-repeat; mask:url(https://unpkg.com/lucide-static@0.469.0/icons/house.svg) center/contain no-repeat;"></div>
      <span style="font:600 10px sans-serif; color:#c4a4ff;">Dashboard</span>
    </button>
    <button style="flex:1; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 0;">
      <div style="width:20px; height:20px; background:#8f86a3; -webkit-mask:url(https://unpkg.com/lucide-static@0.469.0/icons/list-checks.svg) center/contain no-repeat; mask:url(https://unpkg.com/lucide-static@0.469.0/icons/list-checks.svg) center/contain no-repeat;"></div>
      <span style="font:500 10px sans-serif; color:#8f86a3;">Habits</span>
    </button>
    <button style="flex:1; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 0;">
      <div style="width:20px; height:20px; background:#8f86a3; -webkit-mask:url(https://unpkg.com/lucide-static@0.469.0/icons/chart-bar.svg) center/contain no-repeat; mask:url(https://unpkg.com/lucide-static@0.469.0/icons/chart-bar.svg) center/contain no-repeat;"></div>
      <span style="font:500 10px sans-serif; color:#8f86a3;">Stats</span>
    </button>
    <button style="flex:1; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 0;">
      <div style="width:20px; height:20px; background:#8f86a3; -webkit-mask:url(https://unpkg.com/lucide-static@0.469.0/icons/settings.svg) center/contain no-repeat; mask:url(https://unpkg.com/lucide-static@0.469.0/icons/settings.svg) center/contain no-repeat;"></div>
      <span style="font:500 10px sans-serif; color:#8f86a3;">Settings</span>
    </button>
  </div>
</nav>

</body>
</html>
